686/\"},\"url\":\"/title/p980-man-of-rust\",\"uploadUrl\":\"/user/upload/p980\",\"editUrl\":\"/user/manga/p980/edit\"},{\"id\":242,\"hid\":\"pvn0\",\"title\":\"I Can See Your Stats!\",\"altTitles\":[\"\\ub108\\uc758 \\uc2a4\\ud0ef\\uc774 \\ubcf4\\uc5ec!\",\"I See Your Stats!\",\"\\u5c55\\u73b0\\u4f60\\u7684\\u6570\\u503c\\u5427\\uff01\",\"Show Me Your Stats!\"],\"type\":\"other\",\"status\":\"finished\",\"originalLanguage\":\"ko\",\"poster\":{\"medium\":\"https://static.comix.to/baac/i/b/e2/68de6bd395fe9@280.jpg\",\"large\":\"https://static.comix.to/baac/i/b/e2/68de6bd395fe9.jpg\"},\"latestChapter\":0,\"finalChapter\":0,\"finalVolume\":0,\"hasChapters\":false,\"chapterUpdatedAtFormatted\":\"\",\"createdAtFormatted\":\"8mos ago\",\"updatedAtFormatted\":\"4h ago\",\"startDate\":\"2023\",\"endDate\":\"?\",\"year\":2023,\"rank\":742,\"synopsis\":\"One day in a city of wizards, *<The Labyrinth>* misfortune struck. Wizard Solar Singh Eira\\u2019s family all died. Thus, making Eira the next Solar Lord. His hometown which he hastily returned to seemed foreign. He barely managed to have a funeral for his family when the fatigue and stress made him faint. When he woke up...\\r\\n\\r\\n**{ Hello Master. It\\u2019s nice to meet you! ^o^ I am the cute spirit GM who will help you with <Otherworldly Adventures!> and <Joyful Territory Management!> full of Master\\u2019s dreams. I am so happy to be with you from now on. Hurray! Could you name me before starting? \\u261e Insert Name __ }**\\r\\n\\r\\nWhy is this pebble looking spirit calling me Master?\\r\\nThis is a quest to level up, no matter how I look at it, even the notification windows look like the game UIs of the previous life.\\r\\n\\r\\nW...What is this technology of modern civilization?\\r\\nIt made me recall the games I used to play, so I decided to work hard on my quests. I even looked around the estate.\\r\\nHowever, that manor...\\r\\n\\r\\n`[Days until the doom of Solar manor, D-234 Days]`\\r\\n\\r\\n*\\u201cThere\\u2019s only 234 days left until doom...?\\u201d*\\r\\nAlright, let\\u2019s start with the succession ceremony. I\\u2019m sure everything will work out.\",\"synopsisHtml\":\"One day in a city of wizards, <i>&lt;The Labyrinth&gt;</i> misfortune struck. Wizard Solar Singh Eira\\u2019s family all died. Thus, making Eira the next Solar Lord. His hometown which he hastily returned to seemed foreign. He barely managed to have a funeral for his family when the fatigue and stress made him faint. When he woke up...<br>\\r\\n<br>\\r\\n<b>{ Hello Master. It\\u2019s nice to meet you! ^o^ I am the cute spirit GM who will help you with &lt;Otherworldly Adventures!&gt; and &lt;Joyful Territory Management!&gt; full of Master\\u2019s dreams. I am so happy to be with you from now on. Hurray! Could you name me before starting? \\u261e Insert Name __ }</b><br>\\r\\n<br>\\r\\nWhy is this pebble looking spirit calling me Master?<br>\\r\\nThis is a quest to level up, no matter how I look at it, even the notification windows look like the game UIs of the previous life.<br>\\r\\n<br>\\r\\nW...What is this technology of modern civilization?<br>\\r\\nIt made me recall the games I used to play, so I decided to work hard on my quests. I even looked around the estate.<br>\\r\\nHowever, that manor...<br>\\r\\n<br>\\r\\n`[Days until the doom of Solar manor, D-234 Days]`<br>\\r\\n<br>\\r\\n<i>\\u201cThere\\u2019s only 234 days left until doom...?\\u201d</i><br>\\r\\nAlright, let\\u2019s start with the succession ceremony. I\\u2019m sure everything will work out.\",\"followsTotal\":1930,\"ratedAvg\":8.3,\"ratedCount\":101,\"contentRating\":\"safe\",\"links\":{\"al\":null,\"mal\":null,\"mu\":\"https://www.mangaupdates.com/series/a1w45w9/\",\"md\":\"https://mangadex.org/title/5e1a4733-1450-4fdb-827b-7d541a3770c1/\",\"mb\":\"https://mangabaka.org/90520/\"},\"url\":\"/title/pvn0-i-can-see-your-stats\",\"uploadUrl\":\"/user/upload/pvn0\",\"editUrl\":\"/user/manga/pvn0/edit\"},{\"id\":253,\"hid\":\"pnre\",\