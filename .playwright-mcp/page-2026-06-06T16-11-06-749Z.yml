er him to do anything.\\u201d \\n\\nThe boy looked rather grim after hearing what it was I ordered. Ah, was I treating him too much like a dog? As my father squeezed the bead, the boy then knelt at my feet. \\n\\n\\u201cMaster\\u201d His red eyes flashed, illuminating his eerie gaze while smiling madly. \\n\\nWhy is he like this to me?! I tried my best to treat him properly!\",\"synopsisHtml\":\"One day, my father gave me a boy slave. He said he saved him from the battlefield because of his good looks. <br>\\n<br>\\n&quot;He has a seal engraved on his heart. As long as you have this bead, he won\\u2019t be able to disobey you. So you can order him to do anything.\\u201d <br>\\n<br>\\nThe boy looked rather grim after hearing what it was I ordered. Ah, was I treating him too much like a dog? As my father squeezed the bead, the boy then knelt at my feet. <br>\\n<br>\\n\\u201cMaster\\u201d His red eyes flashed, illuminating his eerie gaze while smiling madly. <br>\\n<br>\\nWhy is he like this to me?! I tried my best to treat him properly!\",\"followsTotal\":41,\"ratedAvg\":0,\"ratedCount\":0,\"contentRating\":\"safe\",\"links\":{\"al\":null,\"mal\":null,\"mu\":\"https://www.mangaupdates.com/series/km3qzve/\",\"md\":\"https://mangadex.org/title/598dab5c-0ce7-4145-a776-4284b3d0ed27/\",\"mb\":null},\"url\":\"/title/p8gn-i-failed-to-abandon-the-villain-promo\",\"uploadUrl\":\"/user/upload/p8gn\",\"editUrl\":\"/user/manga/p8gn/edit\"},{\"id\":265,\"hid\":\"pz83\",\"title\":\"Rat Royale\",\"altTitles\":[\"\\u306d\\u305a\\u307f\\u30ed\\u30ef\\u30a4\\u30a2\\u30eb\",\"Nezumi Royale\",\"Cu\\u1ed9c chi\\u1ebfn sinh t\\u1eed c\\u1ee7a nh\\u1eefng ch\\u00fa chu\\u1ed9t\"],\"type\":\"manga\",\"status\":\"releasing\",\"originalLanguage\":\"ja\",\"poster\":{\"medium\":\"https://static.comix.to/bd12/i/f/f2/68de6bdbe979a@280.jpg\",\"large\":\"https://static.comix.to/bd12/i/f/f2/68de6bdbe979a.jpg\"},\"latestChapter\":0,\"finalChapter\":0,\"finalVolume\":0,\"hasChapters\":false,\"chapterUp