ol boy who loves football. Yori is a high school girl who is the ex-girlfriend of Riku's brother, and she is full of secrets. This is a story of first love that unfolds with the sea breeze, from a pre-adolescent perspective.\",\"synopsisHtml\":\"Riku is an elementary school boy who loves football. Yori is a high school girl who is the ex-girlfriend of Riku&#039;s brother, and she is full of secrets. This is a story of first love that unfolds with the sea breeze, from a pre-adolescent perspective.\",\"followsTotal\":15,\"ratedAvg\":0,\"ratedCount\":0,\"contentRating\":\"suggestive\",\"links\":{\"al\":\"https://anilist.co/manga/166136/\",\"mal\":\"https://myanimelist.net/manga/145069/\",\"mu\":\"https://www.mangaupdates.com/series/sxiwyeu/\",\"md\":\"https://mangadex.org/title/0b72b7fa-c14e-4270-8d86-5e4993eff40f/\",\"mb\":\"https://mangabaka.org/4944/\"},\"url\":\"/title/pvzy-nami-no-shijima-no-horizont\",\"uploadUrl\":\"/user/upload/pvzy\",\"editUrl\":\"/user/manga/pvzy/edit\"},{\"id\":345,\"hid\":\"407l\",\"title\":\"Second Break!!\",\"altTitles\":[\"\\u30bb\\u30ab\\u30f3\\u30c9\\u30d6\\u30ec\\u30a4\\u30af!!\"],\"type\":\"manga\",\"status\":\"finished\",\"originalLanguage\":\"ja\",\"poster\":{\"medium\":\"https://static.comix.to/41cb/i/a/c9/68de750d42fbe@280.jpg\",\"large\":\"https://static.comix.to/41cb/i/a/c9/68de750d42fbe.jpg\"},\"latestChapter\":0,\"finalChapter\":31,\"finalVolume\":4,\"hasChapters\":false,\"chapterUpdatedAtFormatted\":\"\",\"createdAtFormatted\":\"8mos ago\",\"updatedAtFormatted\":\"1w ago\",\"startDate\":\"2021\",\"endDate\":\"?\",\"year\":2021,\"rank\":0,\"synopsis\":\"Tadatoshi Komine, who enrolled in the prestigious Ogami Gakuen in order to aim for the NBA, suffered a serious injury immediately after enrolling and was cut off from his life as a player. Nine years later, Tadatoshi, who gave up his dream, learns that his former teammate Okido made his NBA debut. \\u201cIf I had to get seriously injured that day\\u201d, he thinks. Mulling over his regrets one night, Tadatoshi suffers a traffic accident and is shocked to find that the impact has sent him to a time in high school before he was injured! In order to pursue the dream that he gave up on once, Tadatoshi starts marching again with the knowledge of the future as a weapon!\",\"synopsisHtml\":\"Tadatoshi Komine, who enrolled in the prestigious Ogami Gakuen in order to aim for the NBA, suffered a serious injury immediately after enrolling and was cut off from his life as a player. Nine years later, Tadatoshi, who gave up his dream, learns that his former teammate Okido made his NBA debut. \\u201cIf I had to get seriously injured that day\\u201d, he thinks. Mulling over his regrets one night, Tadatoshi suffers a traffic accident and is shocked to find that the impact has sent him to a time in high school before he was injured! In order to pursue the dream that he gave up on once, Tadatoshi starts marching again with the knowledge of the future as a weapon!\",\"followsTotal\":3,\"ratedAvg\":5,\"ratedCount\":1,\"contentRating\":\"safe\",\"links\":{\"al\":\"https://anilist.co/manga/142349/\",\"mal\":\"https://myanimelist.net/manga/142254/\",\"mu\":\"https://www.mangaupdates.com/series/llgcwsq/\",\"md\":\"https://mangadex.org/title/7f4ab37f-cb01-48f2-b28d-66a748f9f9c8/\",\"mb\":\"https://mangabaka.org/50816/\"},\"url\":\"/title/407l-second-break\",\"uploadUrl\":\"/user/upload/407l\",\"editUrl\":\"/user/manga/407l/edit\"},{\"id\":362,\"hid\":\"p2x2\",\"title\":\"Husband Wanted!\",\"altTitles\":[\"\\ub0a8\\ud3b8 \\uad6c\\uc778!\"],\"type\":\"manhwa\",\"status\":\"finished\",\"originalLanguage\":\"ko\",\"poster\":{\"medium\":\"https://static.comix.to/9e8d/i/0/0f/68de752d06f13@280.jpg\",\"large\":\"https://static.comix.to/9e8d/i/0/0f/68de752d06f13.jpg\"},\"latestChapter\":0,\"finalChapter\":0,\"finalVolume\":0,\"hasChapters\":false,\"chapterUpdatedAtFormatted\":\"\",\"createdAtFormatted\":\"8mos ago\",\"updatedAtFormatted\":\"1w ago\",\"startDate\":\"2023\",\"endDate\":\"?\",\"year\":2023,\"rank\":0,\"synopsis\":\"The last descendant of a villainous family, that brought the empire to the brink of destruction, Evelyn Revelbritt. Despised by the empire's citizens, annually being the most voted figure who should disappear ASAP, she lives an agonising and exhausting life!\\n\\nHowever, a golden opportunity to change her life has finally arrived.\\n\\n\\\"What? The Ellerheim fiefdom, accompanied by the tile of Grand Duke, has been put up for auction?!\\\"\\n\\nEvelyn made up her mind,\\n\\n\\\"I will win this. Even if I have to die... I will take it!\\\"\\n\\nHowever, there are specific requirements for the auction. First of all, being from a noble family. Second, having judicial authority under the Holy Temple. Third, must be recognised by the royal family after making great contributions. These are only extended to family members and spouses.\\n\\n\\\"In that case, the solution is simple.\\\"\\n\\nEmploying a physically healthy, unmarried man who meets the bidding qualifications as the husband, and entering a contract marriage!\\n\\nCan the empire's most despised woman really hire such a husband? Of course, by offering the highest salary in the industry and generous benefits, not to mention a divorce neatly arranged for after winning the auction. Make sure to secure a substantial alimony! With this, a couple of talented people should appear, right? We warmly welcome your applications!\\n\\nBut this was all Evelyn's misjudgment.\\n...More applicants rushed in than she expected.\",\"synopsisHtml\":\"The last descendant of a villainous family, that brought the empire to the brink of destruction, Evelyn Revelbritt. Despised by the empire&#039;s citizens, annually being the most voted figure who should disappear ASAP, she lives an agonising and exhausting life!<br>\\n<br>\\nHowever, a golden opportunity to change her life has finally arrived.<br>\\n<br>\\n&quot;What? The Ellerheim fiefdom, accompanied by the tile of Grand Duke, has been put up for auction?!&quot;<br>\\n<br>\\nEvelyn made up her mind,<br>\\n<br>\\n&quot;I will win this. Even if I have to die... I will take it!&quot;<br>\\n<br>\\nHowever, there are specific requirements for the auction. First of all, being from a noble family. Second, having judicial authority under the Holy Temple. Third, must be recognised by the royal family after making great contributions. These are only extended to family members and spouses.<br>\\n<br>\\n&quot;In that case, the solution is simple.&quot;<br>\\n<br>\\nEmploying a physically healthy, unmarried man who meets the bidding qualifications as the husband, and entering a contract marriage!<br>\\n<br>\\nCan the empire&#039;s most despised woman really hire such a husband? Of course, by offering the highest salary in the industry and generous benefits, not to mention a divorce neatly arranged for after winning the auction. Make sure to secure a substantial alimony! With this, a couple of talented people should appear, right? We warmly welcome your applications!<br>\\n<br>\\nBut this was all Evelyn&#039;s misjudgment.<br>\\n...More applicants rushed in than she expected.\",\"followsTotal\":66,\"ratedAvg\":0,\"ratedCount\":0,\"contentRating\":\"safe\",\"links\":{\"al\":null,\"mal\":null,\"mu\":\"https://www.mangaupdates.com/series/4ydkita/\",\"md\":\"https://mangadex.org/title/076ac1d3-04a3-43d9-bfa5-e883b970eae1/\",\"mb\":\"https://mangabaka.org/75910/\"},\"url\":\"/title/p2x2-husband-wanted\",\"uploadUrl\":\"/user/upload/p2x2\",\"editUrl\":\"/user/manga/p2x2/edit\"},{\"id\":406,\"hid\":\"p7j2\",\"title\":\"Hunter Academy's Strongest Battle God (Promo)\",\"altTitles\":[\"\\ud5cc\\ud130 \\uc544\\uce74\\ub370\\ubbf8\\uc758 \\ucd5c\\uac15\\ud22c\\uc2e0\"],\"type\":\"other\",\"status\":\"finished\",\"originalLanguage\":\"ko\",\"poster\":{\"medium\":\"https://static.comix.to/ad23/i/1/b8/68de75527abf4@280.jpg\",\"large\":\"https://static.comix.to/ad23/i/1/b8/68de75527abf4.jpg\"},\"latestChapter\":0,\