              - paragraph [ref=e1372]: "Eleven year old Siwoo Jeong can only play by himself during gym class. \"I'm sitting out.\" \"Why are you the only one sitting out?\" \"Are you kidding?\" \"If I go in, everybody else has to sit out. Physically.\" To Siwoo, strength isn't something he's had to train for, but something that's come naturally. When he turned sixteen years old though, the world undergoes a catastrophic change. A floating castle appeared in the sky and, through its choosing, granted people wings to become players. The world had been changed forever. Now, ten years have passed. Despite his incredible strength, Siwoo was not chosen as a player and had lived bumming around, until he saves the life of Irene Su falling from the sky, and is granted access to an underground dungeon as a new player. He's more special than anyone! The herculean Siwoo's dungeon run begins now! --- 26-year-old Jung Si-woo never had any friends, because there was nothing interesting about him. He lived an average life as an average person in an average world. But suddenly, the earth faced a great change when Mysterious floating 'Sky Castles' appeared. The 'Sky Castles' granted some people wings and powers, but unfortunately, Si-woo wasn't one of them. --- **Original Webtoon:** [Daum](https://webtoon.kakao.com/content/%EB%82%98-%ED%99%80%EB%A1%9C-%EB%A1%9C%EA%B7%B8%EC%9D%B8/2366), [KakaoPage](https://page.kakao.com/home/54269969) **Official Translations:** * English: [COPIN](https://copincomics.com/toon/154), [Tappytoon](https://www.tappytoon.com/en/comics/i-log-in-alone), [BiliBili Comics](https://www.bilibilicomics.com/detail/mc677)"
