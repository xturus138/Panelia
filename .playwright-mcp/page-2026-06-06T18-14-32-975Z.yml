                - text: The daughter of a duke, the stuttering Maximilian, married a knight of lowly status at her father’s coercion. After their first night, her husband departed for an expedition without another word. He came back three years later, this time as a famous knight in the whole continent. How will Maximilian face him on his return?
                - text: "\"The more I think of you, the more lonely and lonely I become. I don't know why I can't quit even though it's so painful.\""
                - text: "---"
                - text: A flawless love story of the flawed. Stuttering lady Maximilian is forced into a marriage with Sir Riftan, but he leaves on a campaign after their wedding night. Three years later, he triumphantly returns, ready to cherish her. As life with her husband finally begins, she only has one question — does she deserve this love and happiness?
